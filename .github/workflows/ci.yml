name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  phpunit:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: panglong_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql, gd, intl, zip, curl, sqlite3
          coverage: pcov

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          php artisan key:generate

      - name: Create databases
        run: mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS panglong;"

      - name: Run migrations (app database)
        run: php artisan migrate --force

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit

  e2e:
    name: Frontend (Playwright E2E)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: panglong
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql, gd, intl, zip, curl, sqlite3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          php artisan key:generate

      - name: Migrate and seed database
        run: php artisan migrate --seed --force

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start API server
        run: php artisan serve --host=127.0.0.1 --port=8000 &

      - name: Start frontend server
        run: |
          mkdir -p /tmp/webroot
          ln -s "$GITHUB_WORKSPACE" /tmp/webroot/panglong
          sudo php -S 0.0.0.0:80 -t /tmp/webroot &

      - name: Wait for servers
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/v1/auth/login -X POST \
                 -H "Content-Type: application/json" \
                 -d '{"username":"admin","password":"password123"}' >/dev/null \
               && curl -sf http://localhost/panglong/frontend/login.php >/dev/null; then
              echo "Servers ready"; exit 0
            fi
            sleep 2
          done
          echo "Servers did not become ready in time"; exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
