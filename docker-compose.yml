version: '3.8'

services:
  app:
    build: .
    container_name: panglong-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - panglong
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: panglong-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: panglong
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - panglong-db:/var/lib/mysql
    networks:
      - panglong

  nginx:
    image: nginx:alpine
    container_name: panglong-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - panglong
    depends_on:
      - app

  frontend:
    image: php:8.3-apache
    container_name: panglong-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./frontend:/var/www/html
    networks:
      - panglong

volumes:
  panglong-db:

networks:
  panglong:
    driver: bridge
